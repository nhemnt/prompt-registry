[alembic]
# Path to the alembic scripts folder
script_location = alembic

# Template for migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file timestamps
timezone = UTC

# Maximum length of slug
truncate_slug_length = 40

# Set to true to run migrations in a transaction
# (always true for PostgreSQL anyway)
transaction_per_migration = false

# SQLAlchemy URL — overridden dynamically in env.py from settings
# so this value is a placeholder only
sqlalchemy.url = postgresql+asyncpg://hemant:password@localhost:5432/prompt_registry

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
